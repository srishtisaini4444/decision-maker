<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Decision Maker</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="background-decor">

    <span class="sparkle sparkle1">✨</span>
    <span class="sparkle sparkle2">💖</span>
    <span class="sparkle sparkle3">🌸</span>
    <span class="sparkle sparkle4">✨</span>
    <span class="sparkle sparkle5">💗</span>

</div>

    <div class="container">

        <header>

    <h1>🎀 Cherry Choose</h1>

    <p>
        Can't decide? Let destiny choose for you! 💖
    </p>

</header>

<div class="cloud">
    ☁️
</div>

        <main>

            
            <section class="question-section">
                <label for="question">Question</label>
                <input
                    type="text"
                    id="question"
                    placeholder="e.g. What should I eat today?"
                >
            </section>

            
            <section class="options-section">

                <h2>Options</h2>

                <div id="options-container">

    <div class="option-row">
        <input
            type="text"
            class="option-input"
            placeholder="Enter an option"
        >
        <button class="remove-btn">✖</button>
    </div>

</div>

                <button id="add-option-btn">
                    + Add Option
                </button>

            </section>

            
            <section class="decision-section">

                <button id="decide-btn">
                    🎡 Decide
                </button>

            </section>

            
            <section class="result-section">

    <h2>👑 Winner</h2>

    <div class="winner-card">

        <div id="winner-emoji">
            🎀
        </div>

        <p id="result">
            No decision yet
        </p>

        <small id="winner-message">
            Your lucky choice will appear here!
        </small>

    </div>

</section>

        </main>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

    <script src="script.js"></script>

</body>
</html>
